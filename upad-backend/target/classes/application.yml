server:
  port: 8080

spring:
  application:
    name: upad-backend

  # ── Perfil por defecto: H2 en memoria para desarrollo rápido ──
  datasource:
    url: jdbc:h2:mem:upaddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

---
# ── Perfil PostgreSQL para producción ──
spring:
  config:
    activate:
      on-profile: postgres

  datasource:
    url: jdbc:postgresql://localhost:5432/upad_db
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:upad_user}
    password: ${DB_PASSWORD:upad_pass}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: false
